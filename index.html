<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blex</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sky: #38bdf8;
      --sky-dark: #0ea5e9;
      --blue: #2563eb;
      --white: #ffffff;
      --gray-100: #f1f3f6;
      --gray-200: #e2e6ed;
      --gray-400: #9ba3ae;
      --gray-600: #5c6470;
      --gray-900: #111318;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #fff;
      display: flex; justify-content: center; align-items: stretch;
    }
    .phone-shell {
      width: 100%; max-width: 430px; height: 100%;
      background: #fff; overflow: hidden; position: relative;
    }

    /* SCREENS */
    .screen {
      position: absolute; inset: 0; overflow: hidden;
      transition: transform 0.5s cubic-bezier(0.77,0,0.18,1), opacity 0.5s ease;
    }
    .screen.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .screen.hidden-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
    .screen.active       { transform: translateX(0);     opacity: 1; }

    /* ═══ SCREEN 1: WELCOME ═══ */
    #screen-welcome {
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 48px 32px 52px;
    }
    .welcome-top {
      width: 100%; display: flex; flex-direction: column; align-items: center;
      padding-top: 8px;
      animation: fadeDown 1s cubic-bezier(0.22,1,0.36,1) 0.3s both;
    }
    .w-eyebrow {
      font-family: var(--font-body); font-size: 10px; font-weight: 500;
      letter-spacing: 5px; text-transform: uppercase;
      color: rgba(0,0,0,0.28); margin-bottom: 10px;
    }
    .w-title {
      font-family: var(--font-display); font-size: 34px; font-weight: 400;
      color: #111; text-align: center; line-height: 1.2;
    }
    .w-brand {
      font-style: italic; font-weight: 600;
      background: linear-gradient(120deg, #0ea5e9 0%, #2563eb 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* Sphere */
    .sphere-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      width: 100%; position: relative;
      animation: fadeIn 1s ease 0.7s both;
    }
    .sphere-glow {
      position: absolute; width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .sphere-inner { width: 200px; height: 200px; position: relative; }
    .container3d { position: absolute; inset: 0; zoom: 0.5; pointer-events: none; }
    .loader3d {
      position: absolute;
      top: calc(50% - 200px); left: calc(50% - 200px);
      animation: girar 8s linear infinite;
      width: 400px; height: 400px;
      transform-style: preserve-3d; perspective: 10000px;
    }
    .loader3d, .sph, .itm {
      width: 400px; height: 400px; position: absolute; transform-style: preserve-3d;
    }
    .sph, .itm { top: 0; left: 0; }
    .sph { transform: rotate(calc(var(--r) * 20deg)); }
    .itm {
      border-radius: 50%; background: var(--bg);
      transform: rotateY(calc(var(--ry) * 20deg));
      border: 1px solid rgba(0,0,0,0.04);
    }
    .c1{--bg:#f008} .c2{--bg:#f0f8} .c3{--bg:#ff08}
    .c4{--bg:#0f08} .c5{--bg:#0ff8} .c6{--bg:#00f8}
    .c7{--bg:#dc1ddf88} .c8{--bg:#ffa50088} .c9{--bg:#e5b2ca88}
    @keyframes girar { to { transform: rotateX(360deg) rotateY(360deg); } }

    .welcome-bottom {
      width: 100%; display: flex; justify-content: center;
      animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 1s both;
    }
    .btn-start {
      padding: 13px 56px;
      background: var(--sky);
      color: #fff; font-family: var(--font-body);
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 50px; cursor: pointer;
      letter-spacing: 0.8px;
      box-shadow: 0 5px 20px rgba(56,189,248,0.38);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-start:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(56,189,248,0.28); }

    /* ═══ SCREEN 2: REGISTER ═══ */
    #screen-login {
      background: #fff;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Hero with logo blended naturally */
    .app-hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 32px;
      background: linear-gradient(180deg, #e8f6fd 0%, #f2faff 50%, #ffffff 100%);
      overflow: hidden;
    }

    /* Subtle circles for depth */
    .app-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .app-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .back-btn {
      position: absolute; top: 18px; left: 18px;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background 0.2s;
    }
    .back-btn:active { background: rgba(255,255,255,0.9); }

    /* Logo: large, no container, blended */
    .logo-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      display: block;
      /* Blend the white background of logo with page bg */
      mix-blend-mode: multiply;
      animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
      position: relative;
      z-index: 2;
      margin-bottom: 10px;
    }

    .app-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, #0ea5e9 0%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 2;
      animation: fadeUp 0.4s ease 0.35s both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Form area */
    .login-body {
      flex: 1; overflow-y: auto;
      padding: 20px 24px 36px;
      display: flex; flex-direction: column;
    }

    .field-label {
      font-family: var(--font-body); font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--gray-600); margin-bottom: 8px; margin-top: 16px;
    }
    .field-label:first-child { margin-top: 0; }

    .field-input {
      width: 100%; padding: 14px 16px;
      background: #fff; border: 1.5px solid var(--gray-200); border-radius: 14px;
      font-family: var(--font-body); font-size: 15px; color: var(--gray-900);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-input::placeholder { color: var(--gray-400); }
    .field-input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }

    .forgot {
      font-family: var(--font-body); font-size: 12px;
      color: var(--sky-dark); text-align: right;
      margin-top: 8px; cursor: pointer; font-weight: 500;
    }

    .login-actions { display: flex; flex-direction: column; gap: 11px; margin-top: 20px; }

    .btn-login-main {
      width: 100%; padding: 16px 0;
      background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
      color: #fff; font-family: var(--font-body);
      font-size: 16px; font-weight: 600;
      border: none; border-radius: 16px; cursor: pointer;
      box-shadow: 0 6px 22px rgba(56,189,248,0.35);
      transition: transform 0.15s ease;
    }
    .btn-login-main:active { transform: scale(0.97); }

    .social-divider { display: flex; align-items: center; gap: 10px; margin: 2px 0; }
    .sdl { flex: 1; height: 1px; background: var(--gray-200); }
    .sdt { font-family: var(--font-body); font-size: 12px; color: var(--gray-400); }

    .btn-social {
      width: 100%; padding: 13px 20px;
      border-radius: 14px; border: 1.5px solid var(--gray-200);
      background: #fff; font-family: var(--font-body);
      font-size: 14px; font-weight: 500; color: var(--gray-900);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-social:active { background: var(--gray-100); transform: scale(0.98); }
    .btn-social.apple { background: #000; color: #fff; border-color: #000; }
    .btn-social.apple:active { background: #1a1a1a; }

    .signup-note {
      font-family: var(--font-body); font-size: 13px;
      color: var(--gray-400); text-align: center; margin-top: 16px;
    }
    .signup-note span { color: var(--sky-dark); font-weight: 600; cursor: pointer; }

    /* Toast */
    #toast {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,20,20,0.88); color: #fff;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      padding: 12px 22px; border-radius: 50px;
      opacity: 0; transition: all 0.3s ease; pointer-events: none;
      white-space: nowrap; z-index: 999;
      backdrop-filter: blur(10px);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

      <div class="app-name">Blex</div>

    <div class="login-body">
      <div class="field-label">Full Name</div>
      <input class="field-input" type="text" placeholder="e.g. Alex Johnson">

      <div class="field-label">Email Address</div>
      <input class="field-input" type="email" placeholder="you@example.com">

      <div class="field-label">Password</div>
      <input class="field-input" type="password" placeholder="8+ characters">
      <div class="forgot">Forgot password?</div>

      <div class="login-actions">
        <button class="btn-login-main">Create Account →</button>

        <div class="social-divider">
          <div class="sdl"></div>
          <span class="sdt">or continue with</span>
          <div class="sdl"></div>
        </div>

        <button class="btn-social apple" onclick="signInWithApple()">
          <svg width="18" height="18" viewBox="0 0 1024 1024" fill="white">
            <path d="M747.4 535.7c-.4-68.2 30.5-119.6 92.9-157.5-34.9-50-87.7-77.5-157.3-82.8-65.9-5.2-138 38.4-164.4 38.4-27.9 0-91.7-36.6-141.9-36.6C273.1 298.8 163 379.8 163 544.6c0 48.7 8.9 99 26.7 150.8 23.8 68.2 109.6 235.3 199.1 232.6 46.8-1.1 79.9-33.2 140.8-33.2 59.1 0 89.7 33.2 141.9 33.2 90.3-1.3 167.9-153.2 190.5-221.6-121.1-57.1-114.6-167.2-114.6-170.7zm-105.1-305c50.7-60.2 46.1-115 44.6-134.7-44.8 2.6-96.6 30.5-126.1 64.8-32.5 36.8-51.6 82.3-47.5 133.6 48.4 3.7 92.6-21.2 129-63.7z"/>
          </svg>
          Continue with Apple
        </button>

        <button class="btn-social" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C37 39.2 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <div class="signup-note">
        Already have an account? <span onclick="goBack()">Sign in</span>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active','hidden-left','hidden-right');
      s.classList.add('hidden-left');
    });
    const t = document.getElementById(id);
    t.classList.remove('hidden-left','hidden-right');
    t.classList.add('active');
  }

  function goBack() {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active','hidden-left','hidden-right');
      s.classList.add('hidden-right');
    });
    const w = document.getElementById('screen-welcome');
    w.classList.remove('hidden-left','hidden-right');
    w.classList.add('active');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function signInWithGoogle() {
    const params = new URLSearchParams({
      client_id: 'YOUR_GOOGLE_CLIENT_ID',
      redirect_uri: window.location.origin,
      response_type: 'token',
      scope: 'email profile',
      prompt: 'select_account'
    });
    const url = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
    const w = 480, h = 600;
    const left = Math.max(0, (screen.width  - w) / 2);
    const top  = Math.max(0, (screen.height - h) / 2);
    const popup = window.open(url, 'GoogleSignIn',
      );
    if (!popup || popup.closed) {
      showToast('Enable pop-ups to sign in with Google');
    } else {
      showToast('Opening Google sign-in…');
    }
  }

  function signInWithApple() {
    const params = new URLSearchParams({
      client_id: 'YOUR_APPLE_SERVICE_ID',
      redirect_uri: window.location.origin,
      response_type: 'code',
      scope: 'name email',
      response_mode: 'fragment'
    });
    const url = 'https://appleid.apple.com/auth/authorize?' + params.toString();
    const w = 480, h = 600;
    const left = Math.max(0, (screen.width  - w) / 2);
    const top  = Math.max(0, (screen.height - h) / 2);
    const popup = window.open(url, 'AppleSignIn',
      );
    if (!popup || popup.closed) {
      showToast('Enable pop-ups to sign in with Apple');
    } else {
      showToast('Opening Apple sign-in…');
    }
  }
</script>
</body>
