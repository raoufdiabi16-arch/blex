<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blex</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-dark: #1e3a8a;
      --blue-glow: rgba(37,99,235,0.35);
      --white: #ffffff;
      --off-white: #f8f9fb;
      --gray-100: #f1f3f6;
      --gray-200: #e2e6ed;
      --gray-400: #9ba3ae;
      --gray-600: #5c6470;
      --gray-900: #111318;
      --teal: #0d9488;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-shell {
      width: 390px;
      height: 844px;
      background: #000;
      border-radius: 54px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08) inset;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    /* ─── SCREENS ─── */
    .screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transition: transform 0.55s cubic-bezier(0.77,0,0.18,1), opacity 0.55s ease;
    }

    .screen.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .screen.hidden-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
    .screen.active       { transform: translateX(0);     opacity: 1; }

    /* ══════════════════════════════════════
       SCREEN 1 — WELCOME
    ══════════════════════════════════════ */
    #screen-welcome {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 70px 28px 52px;
    }

    .status-bar {
      position: absolute;
      top: 14px; left: 28px; right: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
    }
    .status-time {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-icons svg { fill: #fff; }

    .welcome-top {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px;
      animation: fadeDown 1s cubic-bezier(0.22,1,0.36,1) 0.3s both;
    }

    .w-eyebrow {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .w-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 400;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }

    .w-brand {
      font-style: italic;
      font-weight: 600;
      background: linear-gradient(120deg, #fff 0%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 3D Sphere */
    .sphere-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      animation: fadeIn 1s ease 0.7s both;
    }

    .sphere-glow {
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .sphere-inner {
      width: 200px;
      height: 200px;
      position: relative;
    }

    .container3d {
      position: absolute;
      inset: 0;
      zoom: 0.5;
      pointer-events: none;
    }

    .loader3d {
      position: absolute;
      top: calc(50% - 200px);
      left: calc(50% - 200px);
      animation: girar 8s linear infinite;
      width: 400px; height: 400px;
      transform-style: preserve-3d;
      perspective: 10000px;
    }

    .loader3d, .sph, .itm {
      width: 400px; height: 400px;
      position: absolute;
      transform-style: preserve-3d;
    }

    .sph, .itm { top: 0; left: 0; }
    .sph { transform: rotate(calc(var(--r) * 20deg)); }

    .itm {
      border-radius: 50%;
      background: var(--bg);
      transform: rotateY(calc(var(--ry) * 20deg));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .c1{--bg:#f008} .c2{--bg:#f0f8} .c3{--bg:#ff08}
    .c4{--bg:#0f08} .c5{--bg:#0ff8} .c6{--bg:#00f8}
    .c7{--bg:#dc1ddf88} .c8{--bg:#ffa50088} .c9{--bg:#e5b2ca88}

    @keyframes girar {
      to { transform: rotateX(360deg) rotateY(360deg); }
    }

    /* Bottom CTA */
    .welcome-bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 1s both;
    }

    .btn-create {
      width: 100%;
      padding: 18px 0;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 0 0 1px rgba(147,197,253,0.2) inset, 0 8px 28px rgba(37,99,235,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-create:active { transform: scale(0.97); box-shadow: 0 4px 14px rgba(37,99,235,0.3); }

    .divrow { display: flex; align-items: center; gap: 10px; }
    .divline { flex: 1; height: 0.5px; background: rgba(255,255,255,0.1); }
    .divtext { font-family: var(--font-body); font-size: 11px; color: rgba(255,255,255,0.28); letter-spacing: 1px; }

    .btn-signin {
      width: 100%;
      padding: 17px 0;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.75);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .btn-signin:active { background: rgba(255,255,255,0.09); }

    /* ══════════════════════════════════════
       SCREEN 2 — LOGIN / CREATE ACCOUNT
    ══════════════════════════════════════ */
    #screen-login {
      background: var(--off-white);
      display: flex;
      flex-direction: column;
    }

    .login-header {
      background: #000;
      padding: 56px 28px 36px;
      position: relative;
      border-radius: 0 0 36px 36px;
      overflow: hidden;
    }

    .login-header::before {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.25) 0%, transparent 65%);
      right: -60px; top: -60px;
    }

    .back-btn {
      position: absolute;
      top: 52px; left: 24px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 5;
      transition: background 0.2s;
    }
    .back-btn:active { background: rgba(255,255,255,0.15); }
    .back-btn svg { fill: #fff; }

    .login-logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-style: italic;
      font-weight: 600;
      background: linear-gradient(120deg, #fff 0%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 20px;
      position: relative; z-index: 2;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 600;
      color: #fff;
      position: relative; z-index: 2;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-family: var(--font-body);
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      position: relative; z-index: 2;
    }

    .login-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field-label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .field-label:first-child { margin-top: 0; }

    .field-input {
      width: 100%;
      padding: 15px 18px;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 14px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field-input::placeholder { color: var(--gray-400); }
    .field-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .forgot {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--blue);
      text-align: right;
      margin-top: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 28px;
    }

    .btn-login-main {
      width: 100%;
      padding: 17px 0;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(37,99,235,0.35);
      transition: transform 0.15s ease;
    }
    .btn-login-main:active { transform: scale(0.97); }

    .social-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
    }
    .social-divider-line { flex: 1; height: 1px; background: var(--gray-200); }
    .social-divider-text {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--gray-400);
    }

    .btn-social {
      width: 100%;
      padding: 15px 20px;
      border-radius: 16px;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-900);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .btn-social:active { background: var(--gray-100); }
    .btn-social.apple { background: #000; color: #fff; border-color: #000; }
    .btn-social.apple:active { background: #111; }
    .btn-social svg { flex-shrink: 0; }

    .signup-note {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--gray-400);
      text-align: center;
      margin-top: 20px;
    }
    .signup-note span {
      color: var(--blue);
      font-weight: 600;
      cursor: pointer;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Notch */
    .notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 34px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }
  </style>
</head>

      <div class="status-icons">

  <!-- ══ SCREEN 2: LOGIN ══ -->

<script>
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active','hidden-left','hidden-right');
      s.classList.add('hidden-left');
    });
    const target = document.getElementById(id);
    target.classList.remove('hidden-left','hidden-right');
    target.classList.add('active');
  }

  function goBack() {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active','hidden-left','hidden-right');
      s.classList.add('hidden-right');
    });
    const w = document.getElementById('screen-welcome');
    w.classList.remove('hidden-left','hidden-right');
    w.classList.add('active');
  }
</script>
